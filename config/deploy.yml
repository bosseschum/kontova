service: kontova
image: bosseschumacher/kontova

servers:
  web:
    - 62.238.45.187

proxy:
  ssl: true
  host: kontova.de

registry:
  username: bosseschumacher
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  args:
    RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}

env:
  clear:
    RAILS_ENV: production
    APP_HOST: kontova.de
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - MAIL_USERNAME
    - MAIL_PASSWORD

accessories:
  db:
    image: postgres:16
    host: 62.238.45.187
    port: 5432
    env:
      clear:
        POSTGRES_DB: kontova_production
        POSTGRES_USER: kontova
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - /var/lib/postgresql/data:/var/lib/postgresql/data
